name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'docs/assets/screenshots/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  pages: write
  id-token: write
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Assemble publish directory
        run: |
          mkdir -p _site
          cp -r site/* _site/
          mkdir -p _site/docs/assets/screenshots
          cp -r docs/assets/screenshots/* _site/docs/assets/screenshots/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
