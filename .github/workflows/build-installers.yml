name: Build Installers / Express Release

# A successful main CI run still publishes automatically. Manual dispatch is
# the express lane: lint, Windows x64 unit/script tests, and the x64 build run in parallel,
# then one create-only publisher releases the exact main commit. Installed
# dependencies use an exact content cache; build and release outputs are never
# cached because they embed the source SHA, version, and runtime configuration.

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-installers-${{ github.run_id }}-${{ github.run_attempt }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24.15.0

permissions:
  actions: read
  contents: read

jobs:
  prepare:
    name: Resolve exact main release
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.target.outputs.sha }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      publish: ${{ steps.target.outputs.publish }}
      block_reason: ${{ steps.target.outputs.block_reason }}
    steps:
      - name: Require a successful main CI or a main dispatch
        id: target
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_REF: ${{ github.ref }}
          DISPATCH_SHA: ${{ github.sha }}
          CI_EVENT: ${{ github.event.workflow_run.event }}
          CI_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          CI_BRANCH: ${{ github.event.workflow_run.head_branch }}
          CI_REPOSITORY:
            ${{ github.event.workflow_run.head_repository.full_name }}
          CI_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            if [ "$CI_EVENT" != "push" ] || \
               [ "$CI_BRANCH" != "main" ] || \
               [ "$CI_REPOSITORY" != "$GITHUB_REPOSITORY" ]; then
              echo "Installer packaging blocked: the trigger is not this repository's main push CI." >&2
              exit 1
            fi
            target="$CI_SHA"
            if [ "$CI_CONCLUSION" = "success" ]; then
              ci_can_publish=true
              block_reason=
            else
              ci_can_publish=false
              block_reason=ci-failed
              echo "CI concluded '$CI_CONCLUSION'; packaging an artifact but blocking Release publication."
            fi
          else
            if [ "$DISPATCH_REF" != "refs/heads/main" ]; then
              echo "Express Release must be dispatched from main." >&2
              exit 1
            fi
            target="$DISPATCH_SHA"
            ci_can_publish=true
            block_reason=
          fi

          if [[ ! "$target" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Release target is not an exact commit SHA." >&2
            exit 1
          fi
          # Every exact successful main build gets its own immutable Release,
          # even when a newer main commit arrives while jobs overlap.
          publish="$ci_can_publish"
          echo "sha=$target" >> "$GITHUB_OUTPUT"
          echo "publish=$publish" >> "$GITHUB_OUTPUT"
          echo "block_reason=$block_reason" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v7
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 0

      - name: Stamp cross-lane monotonic release version
        id: version
        shell: bash
        env:
          RELEASE_TARGET_SHA: ${{ steps.target.outputs.sha }}
        run: |
          checked_out=$(git rev-parse HEAD)
          if [ "$checked_out" != "$RELEASE_TARGET_SHA" ]; then
            echo "Checked-out commit $checked_out does not match $RELEASE_TARGET_SHA." >&2
            exit 1
          fi
          base=$(node -p "require('./app/package.json').version")
          version=$(node script/release-version.js create "$base" "$GITHUB_RUN_ID")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Require a new immutable release tag
        if: steps.target.outputs.publish == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          tag="$RELEASE_TAG"
          set +e
          git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1
          status=$?
          set -e
          case "$status" in
            0)
              echo "Release tag $tag already exists; refusing to replace immutable release assets." >&2
              exit 1
              ;;
            2) ;;
            *)
              echo "Unable to prove release tag $tag is absent (git ls-remote exited $status)." >&2
              exit "$status"
              ;;
          esac

  lint:
    name: Express lint
    if: github.event_name == 'workflow_dispatch'
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive
      - uses: ./.github/actions/setup-ci-environment
        with:
          node-version: ${{ env.NODE_VERSION }}
          arch: x64
      - run: yarn validate-electron-version
      - run: yarn lint
      - run: yarn validate-changelog
      - name: Ensure a clean working directory
        run: git diff --name-status --exit-code

  test:
    name: Express tests Windows x64
    if: github.event_name == 'workflow_dispatch'
    needs: prepare
    runs-on: windows-2022
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          submodules: recursive
      - uses: ./.github/actions/setup-ci-environment
        with:
          node-version: ${{ env.NODE_VERSION }}
          arch: x64
      - name: Run desktop-trampoline tests
        run: |
          cd vendor/desktop-trampoline
          yarn install
          yarn test
      - name: Prepare testing environment
        run: yarn test:setup
        env:
          npm_config_arch: x64
          TARGET_ARCH: x64
      - name: Run unit tests
        run: yarn test:unit
      - name: Run script tests
        run: yarn test:script

  package:
    name: Windows x64
    needs: prepare
    runs-on: windows-2022
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      RELEASE_TARGET_SHA: ${{ needs.prepare.outputs.sha }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
          submodules: recursive
      - name: Require the prepared exact commit
        shell: bash
        run: |
          checked_out=$(git rev-parse HEAD)
          if [ "$checked_out" != "$RELEASE_TARGET_SHA" ]; then
            echo "Checked-out commit $checked_out does not match release target $RELEASE_TARGET_SHA." >&2
            exit 1
          fi
      - uses: ./.github/actions/setup-ci-environment
        with:
          node-version: ${{ env.NODE_VERSION }}
          arch: x64
      - name: Apply prepared release version
        shell: bash
        run: |
          node -e "const f='./app/package.json';const p=require(f);p.version='$RELEASE_VERSION';require('fs').writeFileSync(f, JSON.stringify(p, null, 2) + '\n')"
      - name: Build production app
        run: yarn build:prod
        env:
          DESKTOP_OAUTH_CLIENT_ID: ${{ secrets.DESKTOP_OAUTH_CLIENT_ID }}
          DESKTOP_OAUTH_CLIENT_SECRET:
            ${{ secrets.DESKTOP_OAUTH_CLIENT_SECRET }}
          npm_config_arch: x64
          TARGET_ARCH: x64
      - uses: ./.github/actions/setup-windows-signing
        with:
          enabled: 'false'
      - name: Package production app
        run: yarn package
        env:
          npm_config_arch: x64
          TARGET_ARCH: x64
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p release-payload/installers
          shopt -s nullglob
          for f in \
            "dist/GitHub Desktop-x64.zip" \
            dist/GitHubDesktop-*.nupkg \
            "dist/GitHubDesktopSetup-x64.exe" \
            "dist/GitHubDesktopSetup-x64.msi"; do
            [ -e "$f" ] && cp "$f" release-payload/installers/
          done
          if [ -e dist/RELEASES ]; then
            cp dist/RELEASES release-payload/installers/
            while read -r _sha name _size || [[ -n "$name" ]]; do
              [ -z "$name" ] && continue
              [ -e "release-payload/installers/$name" ] && continue
              case "$name" in
                *-full.nupkg) src=$(ls dist/*-full.nupkg 2>/dev/null | head -n1) ;;
                *-delta.nupkg) src=$(ls dist/*-delta.nupkg 2>/dev/null | head -n1) ;;
                *) src="" ;;
              esac
              [ -n "$src" ] && [ -e "$src" ] && cp "$src" "release-payload/installers/$name"
            done < dist/RELEASES
          fi
          ls -la release-payload/installers
      - name: Verify required release assets
        shell: bash
        run: |
          required=(
            release-payload/installers/RELEASES
            "release-payload/installers/GitHub Desktop-x64.zip"
            release-payload/installers/GitHubDesktopSetup-x64.exe
            release-payload/installers/GitHubDesktopSetup-x64.msi
            "release-payload/installers/GitHubDesktop-${RELEASE_VERSION}-full.nupkg"
            "release-payload/installers/GitHubDesktop-${RELEASE_VERSION}-x64-full.nupkg"
          )
          for asset in "${required[@]}"; do
            if [ ! -s "$asset" ]; then
              echo "Missing or empty required release asset: $asset" >&2
              exit 1
            fi
          done
      - name: Preserve express installer payload
        uses: actions/upload-artifact@v7
        with:
          name: express-release-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-payload/installers/
          if-no-files-found: error
          compression-level: 0
          retention-days: 3
      - name: Generate bounded exact-SHA release notes
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          yarn --silent ts-node -P script/tsconfig.json \
            script/generate-automated-release-notes.ts \
            --repository "$GITHUB_REPOSITORY" \
            --version "$RELEASE_VERSION" \
            --release-sha "$RELEASE_TARGET_SHA" \
            --output "release-payload/release-notes.md"
      - name: Preserve exact release notes
        uses: actions/upload-artifact@v7
        with:
          name:
            express-release-notes-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-payload/release-notes.md
          if-no-files-found: error
          retention-days: 3
      - name: Preserve the upstream CI failure result
        if: needs.prepare.outputs.block_reason == 'ci-failed'
        shell: bash
        run: |
          echo "Installer recovery artifacts were preserved, but this run cannot publish because its upstream CI failed." >&2
          exit 1

  publish:
    name: Publish GitHub release
    needs:
      - prepare
      - lint
      - test
      - package
    if: >-
      always() && needs.prepare.result == 'success' && needs.package.result ==
      'success' && needs.prepare.outputs.publish == 'true' && (github.event_name
      == 'workflow_run' ||
       (needs.lint.result == 'success' && needs.test.result == 'success'))
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    env:
      RELEASE_TARGET_SHA: ${{ needs.prepare.outputs.sha }}
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0
      - uses: actions/download-artifact@v7
        with:
          name: express-release-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-payload/installers
      - uses: actions/download-artifact@v7
        with:
          name:
            express-release-notes-${{ github.run_id }}-${{ github.run_attempt }}
          path: release-payload
      - name: Revalidate immutable release tag before publishing
        shell: bash
        run: |
          tag="$RELEASE_TAG"
          set +e
          git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1
          status=$?
          set -e
          case "$status" in
            0)
              echo "Release tag $tag appeared while building; refusing to update an existing release." >&2
              exit 1
              ;;
            2) ;;
            *)
              echo "Unable to prove release tag $tag is absent (git ls-remote exited $status)." >&2
              exit "$status"
              ;;
          esac
      - name: Verify downloaded release payload
        shell: bash
        run: |
          required=(
            release-payload/installers/RELEASES
            "release-payload/installers/GitHub Desktop-x64.zip"
            release-payload/installers/GitHubDesktopSetup-x64.exe
            release-payload/installers/GitHubDesktopSetup-x64.msi
            "release-payload/installers/GitHubDesktop-${RELEASE_VERSION}-full.nupkg"
            "release-payload/installers/GitHubDesktop-${RELEASE_VERSION}-x64-full.nupkg"
            release-payload/release-notes.md
          )
          for asset in "${required[@]}"; do
            if [ ! -s "$asset" ]; then
              echo "Missing or empty downloaded release payload: $asset" >&2
              exit 1
            fi
          done
      - name: Publish GitHub release
        shell: bash
        run: |
          gh release create "$RELEASE_TAG" release-payload/installers/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$RELEASE_TARGET_SHA" \
            --title "Desktop Material $RELEASE_VERSION" \
            --notes-file release-payload/release-notes.md \
            --latest=false
      - name: Verify published release target
        shell: bash
        run: |
          git fetch origin "refs/tags/$RELEASE_TAG"
          published=$(git rev-parse 'FETCH_HEAD^{commit}')
          if [ "$published" != "$RELEASE_TARGET_SHA" ]; then
            echo "Published tag resolves to $published, expected $RELEASE_TARGET_SHA." >&2
            exit 1
          fi
          if [ "$(gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq .isDraft)" != "false" ]; then
            echo "Published release unexpectedly remained a draft." >&2
            exit 1
          fi
      - name: Promote only a still-current main release
        shell: bash
        run: bash .github/scripts/promote-current-release.sh
