name: Build Installers

# Builds the Desktop Material Windows installer after the complete CI workflow
# succeeds on main. Manual dispatch runs that same reusable CI workflow before
# building. Each run produces a unique release tagged with the workflow run
# number so history is preserved. Installers are attached directly to the
# release (no build artifacts).
#
# Notes:
# - Code signing is disabled (no certificates configured), so installers are
#   unsigned. Provide AZURE_* secrets and flip the signing input to produce
#   signed builds.
# - Desktop Material is Windows-only; non-Windows installers are not produced.

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: 24.15.0

permissions:
  contents: write
  id-token: write

jobs:
  verify-dispatch:
    name: Verify manually dispatched release
    if: >-
      github.event_name == 'workflow_dispatch' && github.ref ==
      'refs/heads/main'
    uses: ./.github/workflows/ci.yml
    with:
      repository: ${{ github.repository }}
      ref: ${{ github.sha }}
      upload-artifacts: false
      environment: ''
      sign: false
    secrets: inherit

  build:
    name: Windows x64
    needs: verify-dispatch
    if: >-
      always() && ((github.event_name == 'workflow_run' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name ==
      github.repository) ||
       (github.event_name == 'workflow_dispatch' &&
        github.ref == 'refs/heads/main' &&
        needs.verify-dispatch.result == 'success'))
    runs-on: windows-2022
    timeout-minutes: 60
    env:
      RELEASE_TARGET_SHA:
        ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TARGET_SHA }}
          submodules: recursive
      - name: Require the current main commit
        shell: bash
        run: |
          checked_out=$(git rev-parse HEAD)
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 { print $1 }')
          if [[ ! "$remote_main" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Unable to resolve the current origin/main commit." >&2
            exit 1
          fi
          if [ "$checked_out" != "$RELEASE_TARGET_SHA" ]; then
            echo "Checked-out commit $checked_out does not match release target $RELEASE_TARGET_SHA." >&2
            exit 1
          fi
          if [ "$remote_main" != "$RELEASE_TARGET_SHA" ]; then
            echo "Release target $RELEASE_TARGET_SHA is stale; origin/main is $remote_main." >&2
            exit 1
          fi
      - uses: ./.github/actions/setup-ci-environment
        with:
          node-version: ${{ env.NODE_VERSION }}
          arch: x64
      - name: Stamp monotonic build version
        id: version
        shell: bash
        # Squirrel only offers an update when the feed's newest package version
        # is strictly greater than the installed one. The committed app version
        # is constant across pushes, so append the ever-increasing run number as
        # a fixed-width SemVer-1-compatible suffix (e.g. 3.6.3-beta3 ->
        # 3.6.3-beta3-b0000000067). electron-winstaller bundles NuGet 2.8,
        # which normalizes dotted SemVer-2 prerelease identifiers and causes
        # script/package.ts to look for a nupkg filename Squirrel never wrote.
        # The alphanumeric, zero-padded suffix is preserved by NuGet 2.8 and
        # compares lexically in run order for both JS semver and Squirrel.
        run: |
          base=$(node -p "require('./app/package.json').version")
          printf -v build '%010d' "${{ github.run_number }}"
          version="${base}-b${build}"
          node -e "const f='./app/package.json';const p=require(f);p.version='${version}';require('fs').writeFileSync(f, JSON.stringify(p, null, 2) + '\n')"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Fork build version: ${version}"
      - name: Require a new immutable release tag
        shell: bash
        run: |
          tag="v${{ steps.version.outputs.version }}"
          set +e
          git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1
          status=$?
          set -e
          case "$status" in
            0)
              echo "Release tag $tag already exists; refusing to replace immutable release assets." >&2
              exit 1
              ;;
            2)
              # --exit-code reserves status 2 for a successful query with no
              # matching refs. Only that exact result proves the tag is absent.
              ;;
            *)
              echo "Unable to prove release tag $tag is absent (git ls-remote exited $status)." >&2
              exit "$status"
              ;;
          esac
      - name: Build production app
        run: yarn build:prod
        env:
          DESKTOP_OAUTH_CLIENT_ID: ${{ secrets.DESKTOP_OAUTH_CLIENT_ID }}
          DESKTOP_OAUTH_CLIENT_SECRET:
            ${{ secrets.DESKTOP_OAUTH_CLIENT_SECRET }}
          npm_config_arch: x64
          TARGET_ARCH: x64
      - uses: ./.github/actions/setup-windows-signing
        with:
          enabled: 'false'
      - name: Package production app
        run: yarn package
        env:
          npm_config_arch: x64
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p installers
          shopt -s nullglob
          for f in \
            "dist/GitHub Desktop-x64.zip" \
            dist/GitHubDesktop-*.nupkg \
            "dist/GitHubDesktopSetup-x64.exe" \
            "dist/GitHubDesktopSetup-x64.msi"; do
            [ -e "$f" ] && cp "$f" installers/
          done
          # Publish the Squirrel update feed so the app can auto-update from this
          # repo's releases (feed base = releases/latest/download/, wired up by
          # getUpdatesURL in script/dist-info.ts). The RELEASES manifest
          # references each nupkg by the name Squirrel generated (without the
          # -x64 arch infix that script/package.ts adds afterwards), so attach a
          # copy of each package under the exact referenced name — otherwise
          # releases/latest/download/<name> would 404 during the client update.
          if [ -e dist/RELEASES ]; then
            cp dist/RELEASES installers/
            # Squirrel may omit the final newline, so process a populated EOF record.
            while read -r _sha name _size || [[ -n "$name" ]]; do
              [ -z "$name" ] && continue
              [ -e "installers/$name" ] && continue
              case "$name" in
                *-full.nupkg) src=$(ls dist/*-full.nupkg 2>/dev/null | head -n1) ;;
                *-delta.nupkg) src=$(ls dist/*-delta.nupkg 2>/dev/null | head -n1) ;;
                *) src="" ;;
              esac
              [ -n "$src" ] && [ -e "$src" ] && cp "$src" "installers/$name"
            done < dist/RELEASES
          fi
          ls -la installers
      - name: Verify required release assets
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          required=(
            installers/RELEASES
            installers/GitHubDesktopSetup-x64.exe
            installers/GitHubDesktopSetup-x64.msi
            "installers/GitHubDesktop-${version}-full.nupkg"
            "installers/GitHubDesktop-${version}-x64-full.nupkg"
          )
          for asset in "${required[@]}"; do
            if [ ! -s "$asset" ]; then
              echo "Missing or empty required release asset: $asset" >&2
              exit 1
            fi
          done
      - name: Revalidate current main before publishing
        shell: bash
        run: |
          remote_main=$(git ls-remote origin refs/heads/main | awk 'NR == 1 { print $1 }')
          if [[ ! "$remote_main" =~ ^[0-9a-f]{40}$ ]]; then
            echo "Unable to resolve the current origin/main commit." >&2
            exit 1
          fi
          if [ "$remote_main" != "$RELEASE_TARGET_SHA" ]; then
            echo "Release target $RELEASE_TARGET_SHA became stale while building; origin/main is $remote_main." >&2
            exit 1
          fi
      - name: Revalidate immutable release tag before publishing
        shell: bash
        run: |
          tag="v${{ steps.version.outputs.version }}"
          set +e
          git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1
          status=$?
          set -e
          case "$status" in
            0)
              echo "Release tag $tag appeared while building; refusing to update an existing release." >&2
              exit 1
              ;;
            2)
              # --exit-code reserves status 2 for a successful query with no
              # matching refs. Only that exact result proves the tag is absent.
              ;;
            *)
              echo "Unable to prove release tag $tag is absent (git ls-remote exited $status)." >&2
              exit "$status"
              ;;
          esac
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          target_commitish: ${{ env.RELEASE_TARGET_SHA }}
          name: Desktop Material ${{ steps.version.outputs.version }}
          body: |
            Automated Desktop Material Windows build from commit ${{ env.RELEASE_TARGET_SHA }}.

            Version `${{ steps.version.outputs.version }}`. Unsigned installer
            built by `.github/workflows/build-installers.yml`.

            This release doubles as the auto-update feed: the `RELEASES` manifest
            and `*-full.nupkg` attached here are what the in-app updater pulls
            from `releases/latest/download/` (see `getUpdatesURL` in
            `script/dist-info.ts`).
          prerelease: false
          draft: false
          make_latest: true
          files: installers/**
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
