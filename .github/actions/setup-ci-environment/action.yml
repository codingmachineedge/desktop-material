name: Setup CI Environment
description: Set up Python, Node.js, optional ffmpeg, and install dependencies.

inputs:
  node-version:
    description: Node.js version to use.
    required: true
  arch:
    description: Target architecture for dependency installation.
    required: true
  install-ffmpeg:
    description: Whether to install ffmpeg on Windows.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Use Node.js ${{ inputs.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: yarn

    - name: Install ffmpeg
      if: ${{ runner.os == 'Windows' && inputs.install-ffmpeg == 'true' }}
      shell: bash
      run: choco install ffmpeg --yes --no-progress

    - name: Install and build dependencies
      shell: bash
      run: |
        # Native packages such as dugite download platform archives during
        # postinstall. Hosted runners can occasionally lose that connection;
        # retry the complete install a small, bounded number of times.
        max_attempts=3
        for attempt in $(seq 1 "$max_attempts"); do
          if yarn; then
            exit 0
          fi

          if [ "$attempt" -lt "$max_attempts" ]; then
            delay=$((attempt * 15))
            echo "Dependency installation failed; retrying in ${delay}s (attempt $((attempt + 1))/${max_attempts})..."
            sleep "$delay"
          fi
        done

        exit 1
      env:
        npm_config_arch: ${{ inputs.arch }}
        TARGET_ARCH: ${{ inputs.arch }}

    - name: Install cross-compilation copilot package
      shell: bash
      run: |
        # Map runner.os to Node's process.platform naming
        case "$RUNNER_OS" in
          macOS)   PLATFORM=darwin ;;
          Windows) PLATFORM=win32 ;;
          Linux)   PLATFORM=linux ;;
        esac

        PKG="@github/copilot-${PLATFORM}-${{ inputs.arch }}"
        PKG_VERSION=$(node -p "require('./app/node_modules/@github/copilot/package.json').version")

        if [ ! -d "app/node_modules/@github/copilot-${PLATFORM}-${{ inputs.arch }}" ]; then
          echo "Installing ${PKG}@${PKG_VERSION} for cross-compilation…"
          for attempt in 1 2 3; do
            if (cd app && yarn add --optional --ignore-platform --ignore-scripts "${PKG}@${PKG_VERSION}"); then
              install_succeeded=true
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              delay=$((attempt * 15))
              echo "Install failed; retrying in ${delay} seconds (attempt $((attempt + 1)) of 3)."
              sleep "$delay"
            fi
          done

          if [ "${install_succeeded:-false}" != "true" ]; then
            echo "Failed to install ${PKG}@${PKG_VERSION} after 3 attempts."
            exit 1
          fi
        fi
