name: Setup CI Environment
description: Set up Python, Node.js, optional ffmpeg, and install dependencies.

inputs:
  node-version:
    description: Node.js version to use.
    required: true
  arch:
    description: Target architecture for dependency installation.
    required: true
  install-ffmpeg:
    description: Whether to install ffmpeg on Windows.
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Restore exact installed dependencies
      id: installed-dependencies
      uses: actions/cache@v5
      with:
        path: |
          node_modules
          app/node_modules
          ~/.cache/ms-playwright
          ~/AppData/Local/ms-playwright
        key: >-
          installed-deps-v4-${{ runner.os }}-${{ runner.arch }}-target-${{
          inputs.arch }}-node-${{ inputs.node-version }}-py311-${{
          hashFiles('package.json', 'yarn.lock', 'app/package.json',
          'app/yarn.lock', '.yarnrc', 'app/.yarnrc', 'app/.npmrc',
          'script/post-install.ts',
          '.github/actions/setup-ci-environment/action.yml',
          'vendor/yarn-1.21.1.js', 'vendor/printenvz/**',
          'vendor/windows-argv-parser/**', 'vendor/desktop-notifications/**',
          'vendor/desktop-trampoline/**') }}

    - uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Use Node.js ${{ inputs.node-version }} with installed dependencies
      if: steps.installed-dependencies.outputs.cache-hit == 'true'
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - name: Use Node.js ${{ inputs.node-version }} with Yarn download cache
      if: steps.installed-dependencies.outputs.cache-hit != 'true'
      uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}
        cache: yarn
        cache-dependency-path: |
          yarn.lock
          app/yarn.lock

    - name: Install ffmpeg
      if: ${{ runner.os == 'Windows' && inputs.install-ffmpeg == 'true' }}
      shell: bash
      run: choco install ffmpeg --yes --no-progress

    - name: Install and build dependencies
      if: steps.installed-dependencies.outputs.cache-hit != 'true'
      shell: bash
      run: |
        # Native packages such as dugite download platform archives during
        # postinstall. Hosted runners can occasionally lose that connection;
        # retry the complete install a small, bounded number of times.
        max_attempts=3
        for attempt in $(seq 1 "$max_attempts"); do
          if yarn; then
            exit 0
          fi

          if [ "$attempt" -lt "$max_attempts" ]; then
            delay=$((attempt * 15))
            echo "Dependency installation failed; retrying in ${delay}s (attempt $((attempt + 1))/${max_attempts})..."
            sleep "$delay"
          fi
        done

        exit 1
      env:
        npm_config_arch: ${{ inputs.arch }}
        TARGET_ARCH: ${{ inputs.arch }}

    - name: Install cross-compilation copilot package
      if: steps.installed-dependencies.outputs.cache-hit != 'true'
      shell: bash
      run: |
        # Map runner.os to Node's process.platform naming
        case "$RUNNER_OS" in
          macOS)   PLATFORM=darwin ;;
          Windows) PLATFORM=win32 ;;
          Linux)   PLATFORM=linux ;;
        esac

        PKG="@github/copilot-${PLATFORM}-${{ inputs.arch }}"
        PKG_VERSION=$(node -p "require('./app/node_modules/@github/copilot/package.json').version")

        if [ ! -d "app/node_modules/@github/copilot-${PLATFORM}-${{ inputs.arch }}" ]; then
          echo "Installing ${PKG}@${PKG_VERSION} for cross-compilation…"
          for attempt in 1 2 3; do
            if (cd app && yarn add --optional --ignore-platform --ignore-scripts "${PKG}@${PKG_VERSION}"); then
              install_succeeded=true
              break
            fi

            if [ "$attempt" -lt 3 ]; then
              delay=$((attempt * 15))
              echo "Install failed; retrying in ${delay} seconds (attempt $((attempt + 1)) of 3)."
              sleep "$delay"
            fi
          done

          if [ "${install_succeeded:-false}" != "true" ]; then
            echo "Failed to install ${PKG}@${PKG_VERSION} after 3 attempts."
            exit 1
          fi
        fi

    - name: Verify installed dependencies before use
      shell: bash
      run: |
        required=(
          node_modules/webpack/package.json
          node_modules/electron/package.json
          app/node_modules/dugite/package.json
          app/node_modules/@github/copilot/package.json
        )
        case "$RUNNER_OS" in
          Windows)
            required+=(
              node_modules/electron/dist/electron.exe
              "app/node_modules/@github/copilot-win32-${{ inputs.arch }}/package.json"
            )
            ;;
          macOS)
            required+=(
              node_modules/electron/dist/Electron.app/Contents/MacOS/Electron
              "app/node_modules/@github/copilot-darwin-${{ inputs.arch }}/package.json"
            )
            ;;
          Linux)
            required+=(
              node_modules/electron/dist/electron
              "app/node_modules/@github/copilot-linux-${{ inputs.arch }}/package.json"
            )
            ;;
        esac
        for path in "${required[@]}"; do
          if [ ! -f "$path" ]; then
            echo "Installed dependency cache is incomplete: $path" >&2
            exit 1
          fi
        done
        playwright_ffmpeg=false
        for root in "$HOME/.cache/ms-playwright" "$HOME/AppData/Local/ms-playwright"; do
          if [ -d "$root" ] && find "$root" \
            -mindepth 2 \
            -maxdepth 2 \
            -type f \
            -path "$root/ffmpeg-*/*" \
            \( -name ffmpeg-linux -o -name ffmpeg-mac -o -name ffmpeg-win64.exe \) \
            -print -quit | grep -q .; then
            playwright_ffmpeg=true
            break
          fi
        done
        if [ "$playwright_ffmpeg" != true ]; then
          echo "Installed dependencies are missing Playwright ffmpeg; refusing to save or use this exact cache key." >&2
          exit 1
        fi
