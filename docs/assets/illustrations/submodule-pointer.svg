<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The parent project holds a bookmark that points at exactly version 3 of the robot-kit box on a shelf of versions">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="698" height="398" rx="16" fill="#f8fafc" stroke="#d0d7de" stroke-width="2"/>
  <text x="350" y="44" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1f2328">The big box remembers one exact version</text>

  <!-- parent card -->
  <rect x="50" y="86" width="250" height="250" rx="12" fill="#fde68a" stroke="#b45309" stroke-width="3"/>
  <text x="175" y="120" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#7c2d12">my-project</text>
  <!-- bookmark card -->
  <rect x="80" y="150" width="190" height="110" rx="8" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <circle cx="100" cy="172" r="8" fill="#dc2626"/>
  <text x="118" y="178" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1f2328">Bookmark</text>
  <text x="96" y="206" font-family="sans-serif" font-size="15" fill="#1f2328">robot-kit</text>
  <text x="96" y="234" font-family="sans-serif" font-size="15" font-weight="bold" fill="#dc2626">version 3</text>

  <!-- shelf -->
  <rect x="380" y="300" width="280" height="14" rx="4" fill="#92400e"/>
  <!-- v1 -->
  <rect x="392" y="216" width="72" height="84" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="428" y="264" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#57606a">v1</text>
  <!-- v2 -->
  <rect x="482" y="216" width="72" height="84" rx="8" fill="#e2e8f0" stroke="#94a3b8" stroke-width="2.5"/>
  <text x="518" y="264" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#57606a">v2</text>
  <!-- v3 (chosen) -->
  <rect x="572" y="216" width="72" height="84" rx="8" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="3.5"/>
  <text x="608" y="264" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1d4ed8">v3</text>
  <text x="518" y="182" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#57606a">every version of robot-kit</text>

  <!-- string from bookmark to v3 -->
  <path d="M 270 200 C 400 140, 540 150, 604 210" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrow)"/>

  <text x="350" y="362" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2328">Even when version 4 comes out, your project keeps pointing at version 3</text>
  <text x="350" y="384" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2328">until you move the bookmark yourself.</text>
</svg>
