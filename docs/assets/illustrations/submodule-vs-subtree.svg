<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Left: a submodule stays a labelled box inside the big box. Right: a subtree pours the toys straight into the big box">
  <rect x="1" y="1" width="698" height="418" rx="16" fill="#f8fafc" stroke="#d0d7de" stroke-width="2"/>
  <text x="350" y="44" text-anchor="middle" font-family="sans-serif" font-size="20" font-weight="bold" fill="#1f2328">Two ways to share toys</text>
  <line x1="350" y1="64" x2="350" y2="356" stroke="#d0d7de" stroke-width="2" stroke-dasharray="8 6"/>

  <!-- left: submodule -->
  <text x="180" y="86" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#1d4ed8">Submodule</text>
  <rect x="56" y="102" width="248" height="24" rx="8" fill="#fcd34d" stroke="#b45309" stroke-width="3"/>
  <rect x="64" y="126" width="232" height="160" rx="12" fill="#fde68a" stroke="#b45309" stroke-width="3"/>
  <rect x="104" y="150" width="152" height="112" rx="10" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="3"/>
  <rect x="122" y="176" width="116" height="40" rx="6" fill="#ffffff" stroke="#64748b" stroke-width="2"/>
  <text x="180" y="202" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1f2328">robot-kit</text>
  <text x="180" y="322" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1f2328">The little box stays its own box,</text>
  <text x="180" y="344" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1f2328">with its own label and list.</text>

  <!-- right: subtree -->
  <text x="520" y="86" text-anchor="middle" font-family="sans-serif" font-size="17" font-weight="bold" fill="#15803d">Subtree</text>
  <!-- tipped small box pouring -->
  <g transform="rotate(35 600 120)">
    <rect x="560" y="104" width="80" height="52" rx="8" fill="#bfdbfe" stroke="#1d4ed8" stroke-width="2.5"/>
  </g>
  <circle cx="556" cy="158" r="9" fill="#ef4444" stroke="#b91c1c" stroke-width="2"/>
  <rect x="524" y="168" width="18" height="18" rx="4" fill="#a78bfa" stroke="#6d28d9" stroke-width="2"/>
  <!-- big box -->
  <rect x="396" y="196" width="248" height="24" rx="8" fill="#fcd34d" stroke="#b45309" stroke-width="3"/>
  <rect x="404" y="220" width="232" height="66" rx="12" fill="#fde68a" stroke="#b45309" stroke-width="3"/>
  <!-- toys now loose inside -->
  <circle cx="456" cy="258" r="14" fill="#ef4444" stroke="#b91c1c" stroke-width="2.5"/>
  <rect x="486" y="244" width="28" height="28" rx="5" fill="#22c55e" stroke="#15803d" stroke-width="2.5"/>
  <rect x="528" y="250" width="24" height="20" rx="4" fill="#a78bfa" stroke="#6d28d9" stroke-width="2.5"/>
  <text x="520" y="322" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1f2328">The toys are poured into the big box</text>
  <text x="520" y="344" text-anchor="middle" font-family="sans-serif" font-size="15" fill="#1f2328">and become part of your project.</text>

  <text x="350" y="392" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#1f2328">Submodule = borrow the whole box. Subtree = keep your own copy of the toys.</text>
</svg>
