<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Submodule Manager window with a search box, status chips, and two submodule rows offering Update, Sync, Configure, Remove and Clone buttons">
  <rect x="1" y="1" width="698" height="418" rx="16" fill="#f8fafc" stroke="#d0d7de" stroke-width="2"/>

  <!-- dialog card -->
  <rect x="30" y="20" width="640" height="352" rx="14" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>
  <text x="50" y="52" font-family="sans-serif" font-size="18" font-weight="bold" fill="#1f2328">Submodule manager</text>
  <rect x="470" y="34" width="180" height="28" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="560" y="53" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1f2328">2 submodules · 1 cloned</text>

  <!-- search box -->
  <rect x="50" y="70" width="600" height="36" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <circle cx="72" cy="88" r="7" fill="none" stroke="#57606a" stroke-width="2.5"/>
  <line x1="77" y1="93" x2="84" y2="100" stroke="#57606a" stroke-width="2.5"/>
  <text x="96" y="93" font-family="sans-serif" font-size="14" fill="#57606a">Search submodules by name, path, or URL</text>

  <!-- status chips -->
  <rect x="50" y="118" width="52" height="28" rx="14" fill="#0969da"/>
  <text x="76" y="137" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff">All</text>
  <rect x="110" y="118" width="80" height="28" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="150" y="137" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1f2328">Cloned</text>
  <rect x="198" y="118" width="102" height="28" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="249" y="137" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1f2328">Not cloned</text>
  <rect x="308" y="118" width="106" height="28" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="361" y="137" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1f2328">Out of date</text>
  <rect x="422" y="118" width="102" height="28" rx="14" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="473" y="137" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1f2328">Conflicted</text>

  <!-- row 1: cloned -->
  <rect x="50" y="160" width="600" height="90" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>
  <rect x="64" y="176" width="14" height="14" rx="3" fill="none" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="88" y="189" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1f2328">toys/robot-kit</text>
  <rect x="212" y="173" width="94" height="22" rx="11" fill="#dafbe1"/>
  <text x="259" y="189" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#116329">Up to date</text>
  <text x="88" y="214" font-family="sans-serif" font-size="14" fill="#57606a">github.com/toys/robot-kit · main · 1a2b3c4d</text>
  <rect x="88" y="222" width="72" height="22" rx="11" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="124" y="238" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1f2328">Update</text>
  <rect x="168" y="222" width="60" height="22" rx="11" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="198" y="238" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1f2328">Sync</text>
  <rect x="236" y="222" width="92" height="22" rx="11" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="282" y="238" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1f2328">Configure</text>
  <rect x="336" y="222" width="80" height="22" rx="11" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="376" y="238" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#cf222e">Remove</text>

  <!-- row 2: not cloned -->
  <rect x="50" y="262" width="600" height="90" rx="10" fill="#ffffff" stroke="#d0d7de" stroke-width="2"/>
  <rect x="64" y="278" width="14" height="14" rx="3" fill="none" stroke="#1d4ed8" stroke-width="2.5" stroke-dasharray="3 3"/>
  <text x="88" y="291" font-family="sans-serif" font-size="15" font-weight="bold" fill="#1f2328">toys/blocks</text>
  <rect x="196" y="275" width="120" height="22" rx="11" fill="#fff8c5"/>
  <text x="256" y="291" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#7d4e00">Not initialized</text>
  <text x="88" y="316" font-family="sans-serif" font-size="14" fill="#57606a">github.com/toys/blocks · (not downloaded yet)</text>
  <rect x="88" y="324" width="68" height="22" rx="11" fill="#1f883d"/>
  <text x="122" y="340" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff">Clone</text>
  <rect x="164" y="324" width="60" height="22" rx="11" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="194" y="340" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1f2328">Sync</text>
  <rect x="232" y="324" width="92" height="22" rx="11" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
  <text x="278" y="340" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#1f2328">Configure</text>

  <text x="350" y="400" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#1f2328">One window shows every little box, with a button for every job.</text>
</svg>
