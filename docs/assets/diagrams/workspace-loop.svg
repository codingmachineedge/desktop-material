<svg xmlns="http://www.w3.org/2000/svg" width="1536" height="512" viewBox="0 0 1536 512" role="img" aria-labelledby="title desc">
  <title id="title">The everyday repository loop</title>
  <desc id="desc">Inspect changes then Stage deliberately then Commit locally then Sync safely</desc>
  <rect width="1536" height="512" rx="40" fill="#f8fafc"/>
  <rect x="2" y="2" width="1532" height="508" rx="38" fill="none" stroke="#cbd5e1" stroke-width="4"/>
  <text x="48" y="80" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="750" fill="#10233f">The everyday repository loop</text>
  <path d="M 48 104 H 1488" stroke="#dbe3ed" stroke-width="3"/>
  <g font-family="Segoe UI, Arial, sans-serif"><g>
      <rect x="48" y="142" width="278" height="236" rx="30" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
      <circle cx="90" cy="188" r="24" fill="#1267d6"/>
      <text x="90" y="197" text-anchor="middle" font-size="25" font-weight="700" fill="#ffffff">1</text>
      <text x="76" y="252" font-size="27" font-weight="700" fill="#10233f">Inspect changes</text>
      <text x="76" y="304" font-size="21" fill="#475569">Review the diff</text>
      <rect x="76" y="330" width="222" height="10" rx="5" fill="#bae6fd"/>
<path d="M 326 260 H 386" stroke="#57c7ff" stroke-width="8" stroke-linecap="round"/><path d="M 374 246 L 390 260 L 374 274" fill="none" stroke="#57c7ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
<g>
      <rect x="408" y="142" width="278" height="236" rx="30" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
      <circle cx="450" cy="188" r="24" fill="#1267d6"/>
      <text x="450" y="197" text-anchor="middle" font-size="25" font-weight="700" fill="#ffffff">2</text>
      <text x="436" y="252" font-size="27" font-weight="700" fill="#10233f">Stage deliberately</text>
      <text x="436" y="304" font-size="21" fill="#475569">Choose exact files</text>
      <rect x="436" y="330" width="222" height="10" rx="5" fill="#bae6fd"/>
<path d="M 686 260 H 746" stroke="#57c7ff" stroke-width="8" stroke-linecap="round"/><path d="M 734 246 L 750 260 L 734 274" fill="none" stroke="#57c7ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
<g>
      <rect x="768" y="142" width="278" height="236" rx="30" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
      <circle cx="810" cy="188" r="24" fill="#1267d6"/>
      <text x="810" y="197" text-anchor="middle" font-size="25" font-weight="700" fill="#ffffff">3</text>
      <text x="796" y="252" font-size="27" font-weight="700" fill="#10233f">Commit locally</text>
      <text x="796" y="304" font-size="21" fill="#475569">Create a checkpoint</text>
      <rect x="796" y="330" width="222" height="10" rx="5" fill="#bae6fd"/>
<path d="M 1046 260 H 1106" stroke="#57c7ff" stroke-width="8" stroke-linecap="round"/><path d="M 1094 246 L 1110 260 L 1094 274" fill="none" stroke="#57c7ff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
<g>
      <rect x="1128" y="142" width="278" height="236" rx="30" fill="#ffffff" stroke="#cbd5e1" stroke-width="4"/>
      <circle cx="1170" cy="188" r="24" fill="#16a34a"/>
      <text x="1170" y="197" text-anchor="middle" font-size="25" font-weight="700" fill="#ffffff">4</text>
      <text x="1156" y="252" font-size="27" font-weight="700" fill="#10233f">Sync safely</text>
      <text x="1156" y="304" font-size="21" fill="#475569">Pull then push</text>
      <rect x="1156" y="330" width="222" height="10" rx="5" fill="#86efac"/>

    </g></g>
</svg>
